trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.7.0'
  workingDir: '$(System.DefaultWorkingDirectory)/terraform'

stages:
# ================= TERRAFORM =================
- stage: TerraformDeploy
  displayName: Provision Azure Functions Infra
  jobs:
  - job: TerraformJob
    steps:

    # Step 1 - Install Terraform
    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: $(terraformVersion)

    # Step 2 - Terraform Init
    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init
        workingDirectory: $(workingDir)
        backendServiceArm: azure-service-connection
        backendAzureRmResourceGroupName: rgp-dev-mes
        backendAzureRmStorageAccountName: your-existing-storage-name  # ← your storage
        backendAzureRmContainerName: tfstate                          # ← create this container
        backendAzureRmKey: functions.terraform.tfstate

    # Step 3 - Terraform Plan
    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: azurerm
        command: plan
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: azure-service-connection

    # Step 4 - Terraform Apply
    - task: TerraformTaskV4@4
      displayName: Terraform Apply
      inputs:
        provider: azurerm
        command: apply
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: azure-service-connection
        commandOptions: '-auto-approve'