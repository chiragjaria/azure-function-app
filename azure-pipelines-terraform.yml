trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.7.0'
  workingDir: '$(System.DefaultWorkingDirectory)/terraform'
  functionAppName: 'func-fastapi-dev-cj'

stages:
# ================= TERRAFORM =================
- stage: TerraformDeploy
  displayName: Provision Azure Functions Infra
  jobs:
  - job: TerraformJob
    steps:

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init
        workingDirectory: $(workingDir)
        backendServiceArm: azure-service-connection
        backendAzureRmResourceGroupName: rgp-dev-mes
        backendAzureRmStorageAccountName: stmesdev123    # ← your actual storage name
        backendAzureRmContainerName: tfstate
        backendAzureRmKey: functions.terraform.tfstate

    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: azurerm
        command: plan
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: azure-service-connection

    - task: TerraformTaskV4@4
      displayName: Terraform Apply
      inputs:
        provider: azurerm
        command: apply
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: azure-service-connection
        commandOptions: '-auto-approve'

# ================= DEPLOY FUNCTION CODE =================
- stage: DeployFunctionCode
  displayName: Deploy Function App Code
  dependsOn: TerraformDeploy
  jobs:
  - job: DeployJob
    steps:

    - task: UsePythonVersion@0
      displayName: Use Python 3.10
      inputs:
        versionSpec: '3.10'

    # Install dependencies
    - script: |
        pip install --target="$(System.DefaultWorkingDirectory)/.python_packages/lib/site-packages" -r requirements.txt
      displayName: Install dependencies

    # Zip the function app for deployment
    - task: ArchiveFiles@2
      displayName: Zip function app
      inputs:
        rootFolderOrFile: $(System.DefaultWorkingDirectory)
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/function.zip
        replaceExistingArchive: true
        excludePaths: |
          $(System.DefaultWorkingDirectory)/terraform
          $(System.DefaultWorkingDirectory)/.git

    # Deploy zip to Function App
    - task: AzureFunctionApp@2
      displayName: Deploy to Azure Function App
      inputs:
        connectedServiceNameARM: azure-service-connection
        appType: functionAppLinux
        appName: $(functionAppName)
        package: $(Build.ArtifactStagingDirectory)/function.zip
        runtimeStack: PYTHON|3.10
        deploymentMethod: zipDeploy